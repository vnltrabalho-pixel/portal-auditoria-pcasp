{% extends "base.html" %}

{% block title %}Login - Portal Auditoria{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 100vh; margin-top: -2rem;">
    <form method="POST" style="width: 100%; max-width: 400px; background: #2a2a2a; padding: 2rem; border-radius: 8px; border: 1px solid #333;">
        <h2 style="text-align: center; color: #2E5A47; margin-bottom: 2rem;">🔐 Login</h2>
        
        <div class="form-group">
            <label for="username">Usuário</label>
            <input type="text" id="username" name="username" required autofocus>
        </div>
        
        <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" required>
        </div>
        
        <div class="form-group" style="display: flex; align-items: center; margin: 1rem 0;">
            <input type="checkbox" id="remember" name="remember" style="width: auto; margin-right: 0.5rem;">
            <label for="remember" style="margin: 0;">Lembrar-me</label>
        </div>
        
        <button type="submit" style="width: 100%;">Entrar</button>
        
        <div style="margin-top: 1.5rem; text-align: center; color: #9e9e9e; font-size: 0.85rem;">
            <p><strong>Demo:</strong> admin / senha123</p>
            <p>ou teste / teste123</p>
        </div>
    </form>
</div>
{% endblock %}
